spring:
  application:
    name: book-exchange-backend
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:michael}
    password: ${SPRING_DATASOURCE_PASSWORD:pass}
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/book_exchange_backend}

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:secret-key-for-local-development-please-change}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}