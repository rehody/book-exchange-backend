name: CI

on:
  push:
    branches: [ dev, main ]
  pull_request:


jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Spotless check
        run: ./gradlew --no-daemon spotlessCheck

      - name: Build
        run: ./gradlew --no-daemon build -x check

      - name: Test
        run: ./gradlew --no-daemon test
